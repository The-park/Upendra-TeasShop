<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Matcha Heaven | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Outfit:wght@300;400;600&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6b8f24",
                        "background-light": "#f7f8f6",
                        "background-dark": "#1b1f13",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "brand": ["Outfit", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .bg-overlay {
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.2));
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen relative overflow-hidden flex items-center justify-center">
<!-- Full-Screen Background Image -->
<div class="fixed inset-0 z-0">
<img alt="Zen Tea Ceremony" class="w-full h-full object-cover" data-alt="Minimalist matcha bowl and bamboo whisk on a dark stone surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCx4njd4y-zfcT5EJu4Fg_PX13Lht-kb1Aeg7YNwPhbYLSHjIkyF2_oA8QnSQmfPjd4XZl-NtX7qppu5IFr3LTvjXAUFmMtL0ifLECaN0L3S9VotAQ71mvpbcgzAb0Tjq-XyXS7Y0VWDxSZEVKW25w1KXv1ANKFXFHz3K2OmWod18UdGHgcM2TGC7rRMpLAICrmWtQnWS5PkXsYhgcUEtypC_qWlGXdU6JYi-AtbIwY9yzdYlI7nC8jB0FsraOCA6HFWGySjtMWOBo"/>
<div class="absolute inset-0 bg-overlay"></div>
</div>
<!-- Main Content Area -->
<main class="relative z-10 w-full max-w-md px-6">
<!-- Glassmorphism Card -->
<div class="glass-card rounded-xl p-8 md:p-12 shadow-2xl">
<!-- Logo/Branding -->
<div class="text-center mb-10">
<h1 class="font-serif text-4xl md:text-5xl text-white mb-2 tracking-tight">Matcha Heaven</h1>
<p class="font-brand text-white/70 text-sm tracking-widest uppercase">Pure Zen in Every Sip</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-white/90 ml-1" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/50">
<i class="material-icons text-sm">mail_outline</i>
</span>
<input class="block w-full pl-10 pr-3 py-3 bg-white/10 border border-white/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-white/40 backdrop-blur-sm transition-all outline-none" id="email" name="email" placeholder="your@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-white/90 ml-1" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/50">
<i class="material-icons text-sm">lock_open</i>
</span>
<input class="block w-full pl-10 pr-3 py-3 bg-white/10 border border-white/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-white/40 backdrop-blur-sm transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between text-xs md:text-sm">
<label class="flex items-center space-x-2 cursor-pointer group">
<div class="relative">
<input class="peer hidden" type="checkbox"/>
<div class="w-4 h-4 border border-white/40 rounded bg-white/10 peer-checked:bg-primary peer-checked:border-primary transition-all"></div>
<i class="material-icons absolute inset-0 text-[10px] text-white flex items-center justify-center opacity-0 peer-checked:opacity-100">check</i>
</div>
<span class="text-white/80 group-hover:text-white transition-colors">Remember me</span>
</label>
<a class="text-white/80 hover:text-white transition-colors underline-offset-4 hover:underline" href="#">Forgot password?</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-brand font-semibold py-3.5 px-4 rounded-lg shadow-lg shadow-primary/20 transform transition-all active:scale-[0.98] uppercase tracking-wider text-sm mt-4" type="submit">
                    Log In
                </button>
</form>
<!-- Social/Alternative Login -->
<div class="mt-8 flex flex-col items-center">
<div class="w-full flex items-center mb-6">
<div class="flex-grow border-t border-white/20"></div>
<span class="mx-4 text-white/40 text-xs font-light uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-white/20"></div>
</div>
<div class="flex space-x-4">
<button class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 flex items-center justify-center transition-all">
<img alt="Google" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpQWIDOBD_h0nMz_2b-Rm4MplFHY1voWo5FdshJU1FdxowYuekIwccnGFyMiiMmyXgd8Iv3XxgBScEM3kqquZsyuIBe8sIChGGMgE-fqX3nVkqNLZGAPF_3nujKnYvDC9x8t6vnfiMQWIYDYZh_5ZibZJ3CKuWm5v68tqOypmWrfL0QbItkf--FreZUOmLfM6UAsEm4IXPS-MWbKV-CP90eHc1vQcwv5ctVw8a3-fdQwEvd3ABh6qpkZhMhQOYdo0jyjmJjkLyEWE"/>
</button>
<button class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 flex items-center justify-center transition-all text-white">
<i class="material-icons text-xl">apple</i>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="text-white/60 text-sm">
                    Don't have an account? 
                    <a class="text-white font-semibold hover:text-primary transition-colors ml-1" href="#">Join the ceremony</a>
</p>
</div>
</div>
<!-- Secondary Bottom Links -->
<div class="mt-8 text-center text-white/40 text-[10px] uppercase tracking-widest space-x-6">
<a class="hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-white transition-colors" href="#">Terms of Service</a>
<a class="hover:text-white transition-colors" href="#">Contact Us</a>
</div>
</main>
</body></html>
