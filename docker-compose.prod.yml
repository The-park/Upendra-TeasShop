version: '3.8'

services:
  # Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: teashop_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - mysql
      - redis
    networks:
      - teashop_network

  # Web Server Service (Nginx)
  nginx:
    image: nginx:alpine
    container_name: teashop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/sites/:/etc/nginx/conf.d/
      - ./docker/nginx/ssl/:/etc/ssl/certs/
      - ./docker/logs/nginx/:/var/log/nginx/
    depends_on:
      - app
    networks:
      - teashop_network

  # Database Service
  mysql:
    image: mysql:8.0
    container_name: teashop_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: teashop_production
      MYSQL_USER: teashop_user
      MYSQL_PASSWORD: secure_production_password
      MYSQL_ROOT_PASSWORD: very_secure_root_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
      - ./docker/logs/mysql/:/var/log/mysql/
    ports:
      - "3306:3306"
    networks:
      - teashop_network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: teashop_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --replica-read-only no
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - teashop_network

  # Queue Worker Service
  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: teashop_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - mysql
      - redis
    networks:
      - teashop_network

  # Scheduler Service
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: teashop_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - mysql
      - redis
    networks:
      - teashop_network

# Volumes
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# Networks
networks:
  teashop_network:
    driver: bridge